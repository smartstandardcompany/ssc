<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSC Track - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1c1917 0%, #292524 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fafaf9;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(249, 115, 22, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #f97316;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    p {
      color: #a8a29e;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #78716c;
    }
    .status.online {
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you reconnect.</p>
    <button class="btn" onclick="tryReconnect()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"></path>
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
        <path d="M3 22v-6h6"></path>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
      </svg>
      Try Again
    </button>
    <p class="status" id="status">Checking connection...</p>
  </div>

  <script>
    function checkOnline() {
      const status = document.getElementById('status');
      if (navigator.onLine) {
        status.textContent = 'Connection restored! Redirecting...';
        status.className = 'status online';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        status.textContent = 'Still offline. Please check your connection.';
        status.className = 'status';
      }
    }

    function tryReconnect() {
      const status = document.getElementById('status');
      status.textContent = 'Checking connection...';
      
      fetch('/api/', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          status.textContent = 'Connected! Redirecting...';
          status.className = 'status online';
          setTimeout(() => {
            window.location.href = '/';
          }, 500);
        })
        .catch(() => {
          status.textContent = 'Still offline. Please try again later.';
          status.className = 'status';
        });
    }

    // Check status on load
    checkOnline();

    // Listen for online/offline events
    window.addEventListener('online', checkOnline);
    window.addEventListener('offline', () => {
      document.getElementById('status').textContent = 'Connection lost';
      document.getElementById('status').className = 'status';
    });
  </script>
</body>
</html>
